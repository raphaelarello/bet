services:
  - type: web
    name: rapha-guru-backend
    env: node
    plan: free
    buildCommand: pnpm install && pnpm build
    startCommand: NODE_ENV=production node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        value: rapha-guru-dev-secret-MUDE-EM-PRODUCAO
      - key: PORT
        value: 3000
    healthCheckPath: /api/health
